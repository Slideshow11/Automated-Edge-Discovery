name: Post-merge main CI audit

# Trigger A: push to main — immediate audit on the new HEAD.
# Trigger B: workflow_run completed for the three required workflows —
#            follow-up audit that closes the loop when a slow upstream
#            workflow finishes after the merge push.
#
# IMPORTANT: this workflow must NEVER appear in its own required-workflow
# list. It is an auditor, not a thing-being-audited.

'on':
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - CI
      - Edge Discovery audit tests
      - WFA
    types:
      - completed

permissions:
  contents: read
  actions: read

concurrency:
  # One audit at a time per branch HEAD. workflow_run events can fire
  # multiple times for the same SHA (one per upstream workflow); cancel
  # in-flight duplicates so we don't pile up.
  group: post-merge-main-ci-audit-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  audit-main-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REPO: Slideshow11/Automated-Edge-Discovery
      BRANCH: main
    steps:
      - name: Determine audit SHA
        id: audit_sha
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            AUDIT_SHA="${{ github.event.workflow_run.head_sha }}"
            TRIGGER="workflow_run"
            UPSTREAM="${{ github.event.workflow_run.name }}"
            UPSTREAM_CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            echo "Audit SHA resolved from workflow_run event (upstream=${UPSTREAM}, conclusion=${UPSTREAM_CONCLUSION}): ${AUDIT_SHA}"
          else
            AUDIT_SHA="${{ github.sha }}"
            TRIGGER="push"
            echo "Audit SHA resolved from push event: ${AUDIT_SHA}"
          fi
          # Stale-SHA guard for workflow_run: fetch main and compare.
          if [ "$TRIGGER" = "workflow_run" ]; then
            git init -q /tmp/main-ref
            cd /tmp/main-ref
            git remote add origin "https://github.com/${REPO}.git"
            git fetch --depth=1 origin "${BRANCH}" >/dev/null 2>&1
            CURRENT_MAIN_HEAD="$(git rev-parse FETCH_HEAD)"
            cd - >/dev/null
            echo "Current main HEAD on ${BRANCH}: ${CURRENT_MAIN_HEAD}"
            if [ "$AUDIT_SHA" != "$CURRENT_MAIN_HEAD" ]; then
              echo "::notice title=Stale workflow_run audit SHA::workflow_run head_sha ${AUDIT_SHA} is not current ${BRANCH} HEAD ${CURRENT_MAIN_HEAD}; skipping audit (a newer commit is on main)."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Audit SHA matches current ${BRANCH} HEAD; proceeding."
          else
            echo "Push event; no stale-SHA check needed."
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "audit_sha=${AUDIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Skip (stale workflow_run)
        if: steps.audit_sha.outputs.skip == 'true'
        run: |
          echo "Skipping audit because the workflow_run head_sha is not current main HEAD."
          echo "This is expected when an older slow workflow completes after a newer merge."
          exit 0

      - name: Checkout audit SHA
        if: steps.audit_sha.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.audit_sha.outputs.audit_sha }}
          fetch-depth: 1

      - name: Set up Python
        if: steps.audit_sha.outputs.skip != 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run post-merge main CI audit
        id: audit
        if: steps.audit_sha.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/local/audit_main_ci_for_head.py \
            --repo "${REPO}" \
            --branch "${BRANCH}" \
            --head-sha "${{ steps.audit_sha.outputs.audit_sha }}" \
            --required-workflow CI \
            --required-workflow "Edge Discovery audit tests" \
            --required-workflow WFA \
            --max-polls 6 \
            --poll-seconds 30 \
            --output-json /tmp/aed_post_merge_main_ci_audit.json \
            --output-md /tmp/aed_post_merge_main_ci_audit.md
          STATUS="$(python3 -c 'import json,sys; print(json.load(open("/tmp/aed_post_merge_main_ci_audit.json")).get("status",""))')"
          echo "Audit status: ${STATUS}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: Upload audit artifacts
        if: steps.audit_sha.outputs.skip != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-main-ci-audit-${{ steps.audit_sha.outputs.audit_sha }}
          path: |
            /tmp/aed_post_merge_main_ci_audit.json
            /tmp/aed_post_merge_main_ci_audit.md
          if-no-files-found: warn
          retention-days: 30

      - name: Status — MAIN_CI_AUDIT_GREEN
        if: steps.audit.outputs.status == 'MAIN_CI_AUDIT_GREEN'
        run: |
          echo "All three required workflows succeeded on ${{ steps.audit_sha.outputs.audit_sha }}."

      - name: Status — HOLD_MAIN_CI_PENDING (non-failing, follow-up will close the loop)
        if: steps.audit.outputs.status == 'HOLD_MAIN_CI_PENDING'
        run: |
          echo "::warning title=Post-merge CI audit pending::One or more required workflows are still in_progress on ${{ steps.audit_sha.outputs.audit_sha }}. The workflow_run follow-up trigger will re-run this audit when they complete."

      - name: Status — HOLD_MAIN_CI_FAILED
        if: steps.audit.outputs.status == 'HOLD_MAIN_CI_FAILED'
        run: |
          echo "::error title=Post-merge CI audit failed::One or more required workflows failed on ${{ steps.audit_sha.outputs.audit_sha }}. See audit artifacts for details."
          exit 1

      - name: Status — HOLD_MAIN_CI_MISSING_REQUIRED_WORKFLOW
        if: steps.audit.outputs.status == 'HOLD_MAIN_CI_MISSING_REQUIRED_WORKFLOW'
        run: |
          echo "::error title=Post-merge CI audit missing workflow::A required workflow did not produce a run for ${{ steps.audit_sha.outputs.audit_sha }}. See audit artifacts for details."
          exit 1

      - name: Status — HOLD_MAIN_CI_NO_RUNS_FOR_HEAD
        if: steps.audit.outputs.status == 'HOLD_MAIN_CI_NO_RUNS_FOR_HEAD'
        run: |
          echo "::error title=Post-merge CI audit no runs::No workflow runs were found for ${{ steps.audit_sha.outputs.audit_sha }} on ${BRANCH}. See audit artifacts for details."
          exit 1

      - name: Status — ERROR_*
        if: |
          steps.audit.outputs.status != 'MAIN_CI_AUDIT_GREEN' &&
          steps.audit.outputs.status != 'HOLD_MAIN_CI_PENDING' &&
          steps.audit.outputs.status != 'HOLD_MAIN_CI_FAILED' &&
          steps.audit.outputs.status != 'HOLD_MAIN_CI_MISSING_REQUIRED_WORKFLOW' &&
          steps.audit.outputs.status != 'HOLD_MAIN_CI_NO_RUNS_FOR_HEAD' &&
          steps.audit.outputs.status != '' &&
          startsWith(steps.audit.outputs.status, 'ERROR_')
        run: |
          echo "::error title=Post-merge CI audit tool error::audit_main_ci_for_head.py returned ${{ steps.audit.outputs.status }}. See audit artifacts for details."
          exit 1
