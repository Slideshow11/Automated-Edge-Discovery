name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.OS }}-pip-${{ hashFiles('**/pyproject.toml','**/requirements.txt') }}
          restore-keys: |
            ${{ runner.OS }}-pip-

      - name: Install package (editable) and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff numpy

      - name: Lint (ruff)
        run: |
          ruff --version || true
          ruff check . --quiet || true

      - name: Run tests (pytest)
        run: |
          pytest -q

      - name: Upload pytest cache
        uses: actions/upload-artifact@v4
        with:
          name: pytest-cache
          path: .pytest_cache/

      - name: Codecov placeholder
        run: |
          echo "Codecov upload would happen here (placeholder)."
