name: WFA Nightly

on:
  schedule:
    - cron: '0 3 * * *'  # daily at 03:00 UTC
  workflow_dispatch: {}

jobs:
  run-wfa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create venv and install package
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install -e .
          # install minimal test deps
          pip install pytest pandas || true

      - name: Run tests (fast smoke)
        run: |
          . venv/bin/activate
          make test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pytest-cache
          path: .pytest_cache/
