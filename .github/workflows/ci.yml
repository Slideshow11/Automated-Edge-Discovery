name: CI

on:
  push:
    branches: [ main, 'fix/*', 'feat/*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [3.11]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest coverage

      - name: Run tests with coverage
        run: |
          coverage run --source=engine -m pytest -q
          coverage xml -o coverage.xml || true
          coverage html -d coverage_html || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage_html
          path: coverage_html

      - name: Upload junit/coverage xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage_xml
          path: coverage.xml

  validator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run Event/Options validator checks
        run: bash scripts/ci/validate_event_options_contract.sh

  governance-validators:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run governance manifests validator checks
        run: bash scripts/ci/validate_governance_manifests.sh
