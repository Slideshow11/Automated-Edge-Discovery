name: CI

on:
  push:
    branches: [ main, 'fix/*', 'feat/*' ]
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [3.11]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest coverage

      - name: Run tests with coverage
        run: |
          coverage run --source=engine -m pytest -q
          coverage xml -o coverage.xml || true
          coverage html -d coverage_html || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage_html
          path: coverage_html

      - name: Upload junit/coverage xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage_xml
          path: coverage.xml

      - name: Gather eval corpus test artifacts
        if: always()
        run: |
          set -e
          mkdir -p /tmp/test_eval_artifacts
          # Find eval_out dirs in pytest temp dirs and copy them
          find /tmp/pytest-of-runner -maxdepth 3 -name "eval_out" -type d 2>/dev/null | while read dir; do
            parent=$(basename "$(dirname "$dir")")
            cp -r "$dir" "/tmp/test_eval_artifacts/${parent}_eval_out" 2>/dev/null && echo "Copied: $dir" || echo "Skipped: $dir"
          done
          echo "=== Eval artifact summary ==="
          find /tmp/test_eval_artifacts -type f 2>/dev/null || echo "(no files found)"
          echo "=== End ==="

      - name: Upload eval corpus test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_eval_artifacts
          path: /tmp/test_eval_artifacts

  validator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run Event/Options validator checks
        run: bash scripts/ci/validate_event_options_contract.sh

  governance-validators:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run governance manifests validator checks
        run: bash scripts/ci/validate_governance_manifests.sh

  review-comment-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Runs only on pull_request events targeting main.
    # Skipped on push events (branches like feat/*, fix/*) where
    # github.event.pull_request is absent and PR_NUMBER/HEAD_SHA
    # would be empty, causing check_pr_review_comments.py to fail.
    # Uses gh CLI authenticated via GITHUB_TOKEN.
    # No live Claude, no Hermes mutations.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run review-comment gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/review_comment_gate
          python scripts/local/check_pr_review_comments.py \
            --repo "$REPO" \
            --pr-number "$PR_NUMBER" \
            --reported-head-sha "$HEAD_SHA" \
            --ignore-users "chatgpt-codex-connector[bot]" \
            --output-json /tmp/review_comment_gate/status.json \
            --output-md /tmp/review_comment_gate/status.md
          echo "=== REVIEW COMMENT GATE OUTPUT ==="
          cat /tmp/review_comment_gate/status.json
          echo ""
          # Exit code 0 = CLEAN, 1 = BLOCKED, 2 = INCONCLUSIVE
          # The script itself exits with the correct code — no wrapper needed.

      - name: Upload gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-comment-gate-report
          path: /tmp/review_comment_gate/

  pr-gate-live-smoke:
    needs: [test]
    runs-on: ubuntu-latest
    # Runs on all PRs to main (pull_request trigger is broad).
    # The smoke harness is read-only (no kanban create, no dispatch,
    # no merge, no external side-effects).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run PR gate live smoke harness
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/pr_gate_live_smoke_ci
          python scripts/local/pr_gate_controller_live_smoke.py \
            --repo-owner "$REPO_OWNER" \
            --repo-name "$REPO_NAME" \
            --board aed \
            --output-dir /tmp/pr_gate_live_smoke_ci
          echo "=== SMOKE REPORT ==="
          cat /tmp/pr_gate_live_smoke_ci/PR_GATE_CONTROLLER_LIVE_SMOKE_REPORT.json || true
          echo ""
          echo "=== SMOKE MARKDOWN ==="
          cat /tmp/pr_gate_live_smoke_ci/PR_GATE_CONTROLLER_LIVE_SMOKE_REPORT.md || true
          # Fail job if smoke did not pass
          python .github/workflows/ci_check_smoke.py /tmp/pr_gate_live_smoke_ci

      - name: Upload smoke report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-live-smoke-report
          path: /tmp/pr_gate_live_smoke_ci/PR_GATE_CONTROLLER_LIVE_SMOKE_REPORT.*