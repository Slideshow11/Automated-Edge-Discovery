name: Edge Discovery audit tests

on:
  pull_request:
    paths:
      - 'engine/edge_discovery/**'
      - 'tests/engine/**'
      - '.github/workflows/audit-edge-discovery.yml'
  push:
    branches:
      - feat/audit-wiring
      - feat/audit-wiring-clean
      - main

jobs:
  edge-discovery-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run edge_discovery tests
        run: |
          chmod +x scripts/ci/audit_edge_discovery.sh
          ./scripts/ci/audit_edge_discovery.sh
